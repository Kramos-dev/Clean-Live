<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clean&Live | Amplitude Ultra | Parqueando con Gimario</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',sans-serif;background:#020c06;min-height:100vh;width:100%;overflow:hidden;display:flex;align-items:center;justify-content:center}
.lp{position:relative;width:100%;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 20px 110px;overflow:hidden}

/* FONDOS */
.bg-radial{position:absolute;inset:0;background:radial-gradient(ellipse 70% 55% at 50% 40%,rgba(0,133,202,0.08) 0%,transparent 60%),radial-gradient(ellipse 45% 40% at 80% 70%,rgba(67,176,42,0.07) 0%,transparent 55%),radial-gradient(ellipse 40% 35% at 15% 30%,rgba(58,93,174,0.06) 0%,transparent 55%),#020c06;pointer-events:none}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,133,202,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,133,202,0.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.scanline{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);pointer-events:none}

/* ESQUINAS */
.corner{position:absolute;width:22px;height:22px;opacity:0.5}
.c-tl{top:18px;left:18px;border-top:1.5px solid #0085CA;border-left:1.5px solid #0085CA}
.c-tr{top:18px;right:18px;border-top:1.5px solid #43B02A;border-right:1.5px solid #43B02A}
.c-bl{bottom:18px;left:18px;border-bottom:1.5px solid #43B02A;border-left:1.5px solid #43B02A}
.c-br{bottom:18px;right:18px;border-bottom:1.5px solid #0085CA;border-right:1.5px solid #0085CA}

/* HUD SUPERIOR */
.hud-top{position:absolute;top:20px;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 50px;z-index:10}
.live-pill{display:flex;align-items:center;gap:7px;background:rgba(0,0,0,0.65);border:1px solid rgba(255,40,40,0.45);border-radius:5px;padding:5px 13px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#ff3333;animation:rdot 1.1s ease-in-out infinite}
@keyframes rdot{0%,100%{box-shadow:0 0 0 0 rgba(255,51,51,0.7)}60%{box-shadow:0 0 0 5px rgba(255,51,51,0)}}
.live-txt{font-size:10px;font-weight:700;color:#ff4444;letter-spacing:3px}
.hud-right{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.65);border:1px solid rgba(0,133,202,0.3);border-radius:5px;padding:5px 13px}
.hud-rtxt{font-size:11px;font-weight:700;font-style:italic;color:#0085CA;letter-spacing:1px}

/* WATERMARK */
.watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(50px,10vw,118px);font-weight:900;font-style:italic;color:rgba(0,133,202,0.035);white-space:nowrap;letter-spacing:-2px;pointer-events:none;user-select:none;text-align:center;line-height:1.1}

/* BADGE 24/7 */
.badge247{position:absolute;bottom:22px;right:22px;z-index:10;background:rgba(2,12,6,0.9);border:1px solid rgba(67,176,42,0.45);border-radius:10px;padding:11px 18px;text-align:center;animation:fbadge 4s ease-in-out infinite}
@keyframes fbadge{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.b247-n{font-size:22px;font-weight:900;font-style:italic;color:#43B02A;line-height:1;text-shadow:0 0 14px rgba(67,176,42,0.55)}
.b247-s{font-size:9px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:3px;text-transform:uppercase;margin-top:4px}

/* REDES SOCIALES */
.social-bar{position:absolute;bottom:22px;left:22px;z-index:10;display:flex;flex-direction:column;gap:10px}
.soc-btn{display:flex;align-items:center;gap:9px;background:rgba(2,12,6,0.88);border-radius:8px;padding:8px 14px;text-decoration:none;transition:transform 0.2s ease,box-shadow 0.2s ease;border:1px solid rgba(255,255,255,0.08)}
.soc-btn:hover{transform:translateX(4px)}
.soc-fb{border-color:rgba(24,119,242,0.35)}
.soc-fb:hover{box-shadow:0 0 16px rgba(24,119,242,0.3);border-color:rgba(24,119,242,0.6)}
.soc-ig{border-color:rgba(225,48,108,0.3)}
.soc-ig:hover{box-shadow:0 0 16px rgba(225,48,108,0.3);border-color:rgba(225,48,108,0.5)}
.soc-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.soc-icon-fb{background:#1877F2}
.soc-icon-ig{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
.soc-icon svg{width:14px;height:14px;fill:#fff}
.soc-info{display:flex;flex-direction:column;gap:1px}
.soc-name{font-size:10px;font-weight:700;color:rgba(255,255,255,0.85);letter-spacing:1px}
.soc-handle{font-size:9px;font-weight:400;color:rgba(255,255,255,0.38);letter-spacing:0.5px}

/* BARRA PROGRESO */
.prog-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(0,133,202,0.08);overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,transparent,#0085CA,#43B02A,transparent);animation:prg 6s linear infinite;transform:translateX(-100%)}
@keyframes prg{to{transform:translateX(200%)}}

/* PARTÍCULAS */
.particles{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.p{position:absolute;border-radius:50%;animation:pfloat linear infinite}
@keyframes pfloat{0%{transform:translateY(100vh);opacity:0}10%{opacity:0.5}85%{opacity:0.15}100%{transform:translateY(-20px);opacity:0}}

/* CONTENIDO */
.content{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;text-align:center;width:100%;max-width:820px}

.eyebrow{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.ey-line{height:1px;width:40px}
.ey-l{background:linear-gradient(90deg,transparent,#0085CA)}
.ey-r{background:linear-gradient(90deg,#43B02A,transparent)}
.ey-txt{font-size:11px;font-weight:500;font-style:italic;color:rgba(0,133,202,0.8);letter-spacing:4px;text-transform:uppercase}

/* LOGO CLEAN&LIVE — colores Pantone */
.logo-clean{display:inline-flex;align-items:baseline;gap:0;line-height:1;margin-bottom:4px}
.logo-c{font-size:clamp(36px,7vw,90px);font-weight:900;font-style:italic;letter-spacing:-2px;color:#0085CA}
.logo-l{font-size:clamp(36px,7vw,90px);font-weight:900;font-style:italic;letter-spacing:-2px;color:#3A5DAE}
.logo-e{font-size:clamp(36px,7vw,90px);font-weight:900;font-style:italic;letter-spacing:-2px;color:#72BF44}
.logo-an{font-size:clamp(36px,7vw,90px);font-weight:900;font-style:italic;letter-spacing:-2px;color:#43B02A}
.logo-amp{font-size:clamp(36px,7vw,90px);font-weight:900;font-style:italic;letter-spacing:-2px;color:#0085CA}
.logo-sep{font-size:clamp(36px,7vw,90px);font-weight:900;font-style:italic;color:rgba(255,255,255,0.25)}
.logo-live{font-size:clamp(36px,7vw,90px);font-weight:900;font-style:italic;letter-spacing:-2px;color:#ffffff}

/* Subtítulo "con" */
.h1-con{font-size:clamp(20px,3.5vw,46px);font-weight:500;font-style:italic;color:rgba(255,255,255,0.45);letter-spacing:0.5px;margin-bottom:4px}

/* Amplitude – Ultra */
.h-amplitude{font-size:clamp(22px,4vw,52px);font-weight:900;font-style:italic;letter-spacing:2px;margin-bottom:4px;background:linear-gradient(90deg,#0085CA,#3A5DAE 40%,#72BF44 70%,#43B02A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* Multi Servicios */
.h2{font-size:clamp(13px,2vw,22px);font-weight:500;font-style:italic;color:rgba(255,255,255,0.38);letter-spacing:3px;text-transform:uppercase;margin-bottom:28px}

.divider{width:64px;height:2px;background:linear-gradient(90deg,#0085CA,#43B02A);margin:0 auto 24px;border-radius:1px}

/* ROTADOR SERVICIOS */
.svc-wrap{height:52px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:28px;position:relative;width:100%}
.svc{font-size:clamp(18px,3.2vw,34px);font-weight:700;font-style:italic;white-space:nowrap;position:absolute;opacity:0;transform:translateY(30px);transition:opacity 0.35s ease,transform 0.35s ease}
.svc.show{opacity:1;transform:translateY(0)}
.svc.hide{opacity:0;transform:translateY(-30px)}

/* TELÉFONO */
.phone-wrap{position:relative;margin-bottom:34px}
.ph-label{font-size:11px;font-weight:500;font-style:italic;color:rgba(255,255,255,0.35);letter-spacing:4px;text-transform:uppercase;margin-bottom:8px}
.ph-num{font-size:clamp(46px,10vw,100px);font-weight:900;font-style:italic;color:#ffffff;letter-spacing:-2px;line-height:1;text-shadow:0 0 30px rgba(0,133,202,0.3),0 0 60px rgba(67,176,42,0.15)}
.ph-glow{position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);width:min(90%,400px);height:32px;background:radial-gradient(ellipse,rgba(0,133,202,0.15) 0%,transparent 70%);pointer-events:none}

/* BOTONES */
.btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:10px;padding:14px 30px;border-radius:50px;font-family:'Montserrat',sans-serif;font-size:15px;font-weight:700;font-style:italic;text-decoration:none;transition:transform 0.2s ease,box-shadow 0.2s ease;cursor:pointer;border:none;letter-spacing:0.3px}
.btn-wa{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;box-shadow:0 0 18px rgba(34,197,94,0.28)}
.btn-wa:hover{transform:translateY(-3px);box-shadow:0 0 32px rgba(34,197,94,0.55)}
.btn-call{background:rgba(255,255,255,0.06);color:#fff;border:1px solid rgba(0,133,202,0.35)}
.btn-call:hover{transform:translateY(-3px);background:rgba(0,133,202,0.1);border-color:rgba(0,133,202,0.6);box-shadow:0 0 20px rgba(0,133,202,0.25)}
.icon{font-size:18px;line-height:1;display:inline-block}

/* RESPONSIVE */
@media(max-width:600px){
  .hud-top{padding:0 42px}
  .btns{flex-direction:column;align-items:center}
  .btn{width:250px;justify-content:center}
  .watermark{font-size:36px}
  .social-bar{flex-direction:row;bottom:14px;left:50%;transform:translateX(-50%);gap:8px}
  .soc-btn{padding:7px 10px}
  .soc-handle{display:none}
}
</style>
</head>
<body>
<div class="lp">

  <div class="bg-radial"></div>
  <div class="grid"></div>
  <div class="scanline"></div>

  <div class="corner c-tl"></div>
  <div class="corner c-tr"></div>
  <div class="corner c-bl"></div>
  <div class="corner c-br"></div>

  <div class="particles" id="pts"></div>

  <!-- HUD superior -->
  <div class="hud-top">
    <div class="live-pill">
      <div class="live-dot"></div>
      <span class="live-txt">LIVE</span>
    </div>
    <div class="hud-right">
      <span class="hud-rtxt">KICK STREAM</span>
    </div>
  </div>

  <!-- Título del stream como watermark de fondo -->
  <div class="watermark">Parqueando<br>con Gimario</div>

  <!-- Badge 24/7 -->
  <div class="badge247">
    <div class="b247-n">24/7</div>
    <div class="b247-s">Servicio</div>
  </div>

  <!-- Redes sociales -->
  <div class="social-bar">
    <a href="#" class="soc-btn soc-fb">
      <div class="soc-icon soc-icon-fb">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.268h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
        </svg>
      </div>
      <div class="soc-info">
        <span class="soc-name">Facebook</span>
        <span class="soc-handle">Clean&amp;Live</span>
      </div>
    </a>
    <a href="#" class="soc-btn soc-ig">
      <div class="soc-icon soc-icon-ig">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
        </svg>
      </div>
      <div class="soc-info">
        <span class="soc-name">Instagram</span>
        <span class="soc-handle">Clean&amp;Live</span>
      </div>
    </a>
  </div>

  <!-- Barra de progreso inferior -->
  <div class="prog-bar"><div class="prog-fill"></div></div>

  <!-- CONTENIDO PRINCIPAL -->
  <div class="content">

    <div class="eyebrow">
      <div class="ey-line ey-l"></div>
      <span class="ey-txt">Multiservicios</span>
      <div class="ey-line ey-r"></div>
    </div>

    <!-- Logo Clean&Live con colores Pantone letra a letra -->
    <div class="logo-clean">
      <span class="logo-c">C</span><span class="logo-l">l</span><span class="logo-e">e</span><span class="logo-an">a</span><span class="logo-amp">n</span><span class="logo-sep">&amp;</span><span class="logo-live">Live</span>
    </div>

    <div class="h1-con">en</div>

    <!-- Amplitude Ultra con gradiente de marca -->
    <div class="h-amplitude">KICK</div>

    <!-- Subtítulo cambiado -->
    <div class="h2">Multi Servicios</div>

    <div class="divider"></div>

    <!-- Rotador servicios -->
    <div class="svc-wrap" aria-live="polite">
      <div class="svc show" id="svc">Fontanería general</div>
    </div>

    <!-- Teléfono -->
    <div class="phone-wrap">
      <div class="ph-label">Contáctanos ahora mismo</div>
      <div class="ph-num">6302-6080</div>
      <div class="ph-glow"></div>
    </div>

    <!-- Botones -->
    <div class="btns">
      <a href="https://wa.me/50763026080" class="btn btn-wa">
        <span class="icon">💬</span> WhatsApp
      </a>
      <a href="tel:63026080" class="btn btn-call">
        <span class="icon">📞</span> Llamar ahora
      </a>
    </div>

  </div>
</div>

<script>
// Colores Pantone para los servicios
const svcColors = ['#0085CA','#72BF44','#3A5DAE','#43B02A','#0085CA','#72BF44'];
const svcs = [
  'Fontanería general',
  'Fugas de agua',
  'Remodelaciones',
  'Aire acondicionado',
  'Destaqueos',
  'Fumigaciones'
];
let si = 0;
const sel = document.getElementById('svc');
sel.style.color = svcColors[0];
sel.style.textShadow = `0 0 20px ${svcColors[0]}66`;

setInterval(() => {
  sel.classList.remove('show');
  sel.classList.add('hide');
  setTimeout(() => {
    si = (si + 1) % svcs.length;
    sel.textContent = svcs[si];
    sel.style.color = svcColors[si];
    sel.style.textShadow = `0 0 20px ${svcColors[si]}66`;
    sel.classList.remove('hide');
    sel.classList.add('show');
  }, 350);
}, 2200);

// Partículas con colores de marca
const pc = document.getElementById('pts');
const pColors = ['#0085CA','#43B02A','#3A5DAE','#72BF44'];
function mkp() {
  const d = document.createElement('div');
  d.className = 'p';
  const sz = Math.random() * 2.5 + 1;
  const col = pColors[Math.floor(Math.random() * pColors.length)];
  d.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;bottom:0;background:${col};box-shadow:0 0 ${sz*3}px ${col}99;animation-duration:${Math.random()*14+8}s;animation-delay:${Math.random()*6}s`;
  pc.appendChild(d);
  setTimeout(() => d.remove(), 22000);
}
for (let i = 0; i < 28; i++) setTimeout(mkp, i * 350);
setInterval(mkp, 600);
</script>
</body>
</html>
